name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: the workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (server + web)
        run: npm run lint

      - name: Typecheck (server + web)
        run: npm run typecheck

      - name: Test (server + web)
        run: |
          npm run test --workspace server
          npm run test --workspace web

      - name: Coverage summary (server)
        run: npm run test:coverage --workspace server

      - name: Build (server + web)
        run: npm run build

      - name: Verify seed produces 10,000 employees
        run: |
          npm run seed --workspace server
          test "$(node -e "const D=require('better-sqlite3');const db=new D('server/data/salary.db');console.log(db.prepare('SELECT COUNT(*) n FROM employees').get().n)")" = "10000"

  # The whole deploy story rests on the Docker image, so CI actually builds it
  # (multi-stage: native better-sqlite3 compile + tsup + vite). A broken image
  # fails here instead of shipping green.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t acme-salary:ci .
