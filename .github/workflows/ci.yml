name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (server + web)
        run: npm run typecheck

      - name: Test (server + web)
        run: |
          npm run test --workspace server
          npm run test --workspace web

      - name: Build (server + web)
        run: npm run build

      - name: Verify seed produces 10,000 employees
        run: |
          npm run seed --workspace server
          test "$(node -e "const D=require('better-sqlite3');const db=new D('server/data/salary.db');console.log(db.prepare('SELECT COUNT(*) n FROM employees').get().n)")" = "10000"
